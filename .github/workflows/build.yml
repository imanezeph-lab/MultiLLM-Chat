name: Build MultiLLM-Chat

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .exe
        run: |
          pyinstaller --onefile --windowed `
            --name "MultiLLM-Chat" `
            --icon assets\icon.ico `
            --add-data "assets;assets" `
            --manifest assets\app.manifest `
            --noconfirm --clean main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiLLM-Chat-Windows
          path: dist/MultiLLM-Chat.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .app
        run: |
          pyinstaller --windowed \
            --name "MultiLLM-Chat" \
            --icon assets/icon.png \
            --add-data "assets:assets" \
            --strip \
            --noconfirm --clean main.py

      - name: Sign .app (ad-hoc)
        run: codesign --force --deep --sign - "dist/MultiLLM-Chat.app" || true

      - name: Create .dmg
        run: |
          brew install create-dmg
          create-dmg --overwrite \
            --icon-size 128 \
            --app-drop-link 380 220 \
            MultiLLM-Chat.dmg \
            dist/MultiLLM-Chat.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiLLM-Chat-macOS
          path: MultiLLM-Chat.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: MultiLLM-Chat-Windows
          path: release

      - uses: actions/download-artifact@v4
        with:
          name: MultiLLM-Chat-macOS
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/MultiLLM-Chat.exe
            release/MultiLLM-Chat.dmg
          generate_release_notes: true
